.dropbtn {

  padding: 1px;

.dropdown {

.dropdown-content {

  z-index: 1;
}

.dropdown-content a {
  color: white;
  padding: 0px 0px;
  text-decoration: none;
  display: block;
  font-family: 'Courier New', Courier, monospace;
}

.dropdown{
    font-family: 'Courier New', Courier, monospace;
}

.dropdown-content a:hover {background-color: #5288be;}

.dropdown:hover .dropdown-content {display: block;}

.dropdown:hover .dropbtn {background-color: #97cbff;}
